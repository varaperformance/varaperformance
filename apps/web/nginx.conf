server {
  listen 4173;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve Vite’s pre-compressed .gz (emit gzip_static + gzip_types). The stock image has no Brotli module;
  # .br files in dist/ can still be used if you swap to a brotli-enabled image or another edge layer.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml text/html text/plain;
  gzip_static on;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com https://www.google.com https://www.gstatic.com https://www.googletagmanager.com https://appleid.cdn-apple.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: blob: https://*.mapbox.com https://www.themealdb.com https://*.unsplash.com https://static.exercisedb.dev https://lh3.googleusercontent.com https://avatars.githubusercontent.com; font-src 'self' data:; connect-src 'self' https://accounts.google.com https://appleid.apple.com https://www.google-analytics.com https://region1.google-analytics.com https://api.mapbox.com https://events.mapbox.com https://js.stripe.com https://www.themealdb.com https://static.exercisedb.dev https://*.unsplash.com wss:; frame-src 'self' https://accounts.google.com https://www.google.com https://appleid.apple.com https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

  # Immutable assets — re-declare security headers so nginx inner block doesn't strip them
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Sitemap and robots — served as static files from /usr/share/nginx/html/
  location = /sitemap.xml {
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri $uri/ /index.html;
  }
}