services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: vp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres-shadow-init:
    image: docker.io/library/postgres:17-alpine
    container_name: vp-postgres-shadow-init
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - data
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        export PGPASSWORD=${POSTGRES_PASSWORD:-postgres}
        until pg_isready -h postgres -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mydatabase}; do sleep 1; done
        psql -h postgres -U ${POSTGRES_USER:-postgres} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='mydatabase_shadow'" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER:-postgres} -d postgres -c "CREATE DATABASE mydatabase_shadow"
  redis:
    image: redis:7-alpine
    container_name: vp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - data
    restart: always
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: vp-minio
    restart: unless-stopped
    networks:
      - backend
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-vara_access_key}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-vara_secret_key_change_me}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc:latest
    container_name: vp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-vara_access_key} $${MINIO_ROOT_PASSWORD:-vara_secret_key_change_me};
      mc mb --ignore-existing local/varaperformance-uploads;
      exit 0;
      "
  ollama:
    image: ollama/ollama:latest
    container_name: vp-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
  ollama-model-init:
    image: curlimages/curl:8.12.1
    container_name: vp-ollama-model-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - backend
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        curl -sS http://ollama:11434/api/pull -d '{"name":"gemma2:2b"}'
        curl -sS http://ollama:11434/api/pull -d '{"name":"nomic-embed-text"}'
